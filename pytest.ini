[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Ignore Old directory and its subdirectories
norecursedirs = Old .git __pycache__ *.egg-info .tox .nox

# Mark slow tests (training tests) - can be skipped with '-m "not slow"'
markers =
    slow: marks tests as slow (can skip with '-m "not slow"')

