# Test config for domain transfer - SAFE BASELINE
experiment:
  name: "domain_transfer_test"
  seed: 42
  output_dir: "runs"

# Training strategy: 'joint', 'pretrain_finetune', 'optimized_mixture', or 'mixed_finetune'
training_strategy: "mixed_finetune"

data:
  adv_dataset_path: "data/processed/1_encoded.csv"
  gmsc_dataset_path: "data/gmsc/GiveMeSomeCredit-training.csv"
  # NOTE: adv_ratio ignored for pretrain_finetune
  adv_ratio: 0.90

cross_validation:
  enabled: true
  n_splits: 2
  n_repeats: 1
  shuffle: true

domain_alignment:
  enabled: true
  method: "dann"              # Use DANN for better domain overlap
  weight: 0.02
  start_epoch: 3
  max_weight: 0.1
  ramp_epochs: 5

model:
  # === SAFE BASELINE FOR SMALL DATASET ===
  lr: 0.0005
  finetune_trunk_lr: 0.00005
  batch_size: 16
  gmsc_batch_size: 128       # Larger batch for GMSC pretrain (fast)
  gmsc_pretrain_samples: 2000  # Subsample GMSC for test
  dropout: 0.15
  weight_decay: 0.001
  patience: 5
  max_epochs: 20

  # Loss weights
  gmsc_risk_weight: 0.05
  adv_risk_weight: 1.0
  savings_weight: 1.0

  # Pretrain-finetune settings (smaller for test)
  pretrain_epochs: 5
  finetune_epochs: 10
  freeze_trunk_epochs: 2

  # Mixed finetune settings
  mixed_epochs: 10
  mixed_adv_ratio: 0.85
  mixed_gmsc_ratio: 0.15

  # Joint phase OFF
  enable_joint_phase: false
  joint_epochs: 0
  joint_gmsc_weight: 0.0
