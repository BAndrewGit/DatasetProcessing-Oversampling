experiment:
  name: "hybrid_multitask_transfer"
  seed: 42
  output_dir: "runs"

training_strategy: "hybrid"

data:
  adv_dataset_path: "data/processed/1_encoded.csv"
  gmsc_dataset_path: "data/gmsc/GiveMeSomeCredit-training.csv"
  adv_ratio: 0.9
  gmsc_ratio: 0.1

preprocessing:
  ignored_columns:
    - "Behavior_Risk_Level"
  columns_to_drop:
    - "Confidence"
    - "Outlier"
    - "Cluster"
    - "Auto_Label"

model:
  adv_adapter_dims: [64]
  gmsc_adapter_dims: [32]
  shared_trunk_dims: [64, 32]
  latent_dim: 32
  risk_head_dims: [16]
  savings_head_dims: [16]

  dropout: 0.15
  weight_decay: 0.001
  lr: 0.0005
  batch_size: 16
  gmsc_batch_size: 128
  gmsc_pretrain_samples: 5000
  max_epochs: 100
  patience: 10
  risk_loss: "huber"

  adv_risk_weight: 1.0
  savings_weight: 1.0
  gmsc_risk_weight: 0.03
  warmup_epochs: 8
  freeze_trunk_epochs: 3
  clip_grad: 1.0
  log_gradients: true

cross_validation:
  enabled: true
  n_splits: 5
  n_repeats: 2
  shuffle: true

augmentation:
  enabled: false

domain_alignment:
  enabled: true
  method: "dann"
  weight: 0.02
  start_epoch: 15
  max_weight: 0.08
  ramp_epochs: 10


