# Test config for latent sampling experiment (fast run)
experiment:
  name: "latent_sampling_test"
  seed: 42
  output_dir: "runs"

data:
  dataset_path: "data/processed/1_encoded.csv"
  target_column: "Risk_Score"

# Test uses minimal CV
cross_validation:
  enabled: true
  n_splits: 2
  n_repeats: 1
  shuffle: true

pca:
  ks: [10, 8, 5]
  whiten_options: [false, true]

clustering:
  ks: [2, 3, 4]

sampling:
  synth_counts: [0, 10, 50]
  global_cap: 0.3
  per_cluster_cap: 0.2

model:
  hidden_size: 32
  max_epochs: 5

# Coverage-based sampling parameters
n_coverage_bins: 3
memorization_percentile: 5  # p5 = reasonable for small data
synth_weight: 0.3
synth_grid: [0, 10, 50]

# Quality gate thresholds (lenient for small datasets)
quality_thresholds:
  two_sample_auc: 0.80
  utility_delta: 0.10
  stability_delta: 0.2

stability_repeats: 2


